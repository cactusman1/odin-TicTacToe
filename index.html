<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Tic Tac Toe</title>
  <link href="styles.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="container">
    <div class="sectionOne">
      <div>
        <h2>Player One (X)</h2>
        <label for="playerOne"></label>
        <input type="text" id="playerOne" placeholder="Enter your name">
      </div>

      <button class="start">Start Game</button>

      <div>
        <h2>Player Two (O)</h2>
        <label for="playerTwo"></label>
        <input type="text" id="playerTwo" placeholder="Enter your name">
      </div>
    </div>

    <div class="sectionTwo">
      <div class="playerOneName"></div>

      <div class="subSection">
        <h1 class="playerTurn"></h1>
        <div class="board"></div>
      </div>

      <div class="playerTwoName"></div>
    </div>

    <div class="sectionThree">
      <button class="restart">Restart Game</button>

    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
