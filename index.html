<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Tic Tac Toe</title>
  <link href="styles.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="container">
    <div class="sectionOne">
      <h2>Player One</h2>
      <label for="playerOne">Enter your name</label>
      <input type="text" id="playerOne">

      <button class="start">Start Game</button>

      <h2>Player Two</h2>
      <label for="playerTwo">Enter your name</label>
      <input type="text" id="playerTwo">
    </div>

    <div class="sectionTwo">
      <div class="playerOneName"></div>

      <div class="subSection">
        <h1 class="playerTurn"></h1>
        <div class="board"></div>
      </div>

      <div class="playerTwoName"></div>
    </div>

    <div class="sectionThree">
      <button class="restart">Restart Game</button>

    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
